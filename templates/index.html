<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kalp Sağlığı Testi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="bg"></div>
<div class="container">
    <div class="card">
        <h1 class="title">Kalp Sağlığı <span class="heart">❤️</span></h1>
        <form method="POST">
            <input type="number" name="age" placeholder="Yaşınız" required>
            <label>Cinsiyet</label>
            <select name="sex">
                <option value="1">Erkek</option>
                <option value="0">Kadın</option>
            </select>
            <label>Göğsünüzde sıkışma veya ağrı var mı?</label>
            <select name="cp">
                <option value="4">Hiç ağrı yok</option>
                <option value="3">Çok hafif</option>
                <option value="2">Bazen rahatsız ediyor</option>
                <option value="1">Şiddetli baskı var</option>
            </select>
            <label>Tansiyonunuz genellikle nasıldır?</label>
            <select name="trestbps">
                <option value="120">Normal</option>
                <option value="150">Yüksek</option>
            </select>
            <label>Kolesterol durumunuz nedir?</label>
            <select name="chol">
                <option value="200">Normal</option>
                <option value="260">Yüksek</option>
            </select>
            <label>Şekeriniz nasıl?</label>
            <select name="fbs">
                <option value="0">Normal</option>
                <option value="1">Yüksek / Şekerim var</option>
            </select>
            <label>Yorulunca göğsünüz ağrıyor mu?</label>
            <select name="exang">
                <option value="0">Hayır</option>
                <option value="1">Evet</option>
            </select>
            <div class="field">
                <label>Kalp atış hızınız (Nabız):</label>
                <input type="range" id="thalach" name="thalach" min="60" max="200" value="80" oninput="updateHR(this)">
                <div class="value">Atış: <span id="hrVal">80</span></div>
            </div>
            <div class="field">
                <label>Varsa ağrınızın şiddeti: (0-5)</label>
                <input type="range" id="pain" name="oldpeak" min="0" max="5" step="0.5" value="0" oninput="updatePain(this)">
                <div class="value">Şiddet: <span id="painVal">0</span></div>
            </div>
            <button type="submit">Analiz Et</button>
        </form>
        {% if risk %}
            <div class="result">Risk: %{{ risk }}</div>
            <div class="progress"><div class="progress-bar" style="width: {{ risk }}%;"></div></div>
            <div class="comments">{% for y in yorumlar %}<p>• {{ y }}</p>{% endfor %}</div>
        {% endif %}
    </div>
</div>
<script>
function updateHR(s){
    let v = s.value; document.getElementById("hrVal").innerText = v;
    let p = (v-s.min)/(s.max-s.min)*100;
    let c = v < 100 ? "#00ff88" : v < 145 ? "#ffcc00" : "#ff4d4d";
    s.style.background = `linear-gradient(to right, ${c} ${p}%, #333 ${p}%)`;
}
function updatePain(s){
    let v = s.value; document.getElementById("painVal").innerText = v;
    let p = (v-s.min)/(s.max-s.min)*100;
    let c = v <= 1.5 ? "#00ff88" : v <= 3.5 ? "#ffcc00" : "#ff4d4d";
    s.style.background = `linear-gradient(to right, ${c} ${p}%, #333 ${p}%)`;
}
document.addEventListener("DOMContentLoaded", () => { updateHR(document.getElementById("thalach")); updatePain(document.getElementById("pain")); });
</script>
</body>
</html>
